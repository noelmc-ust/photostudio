apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: 
  name: photo-deployment-hpa
  namespace: studio-ns
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: studio-app
  minReplicas: 4
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60

    


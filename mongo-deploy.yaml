
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: studio-ns
  labels:
    app: mongo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mongo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongodb
          image: mongo:8
          ports:
            - containerPort: 27017

---

apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: studio-ns
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
  type: ClusterIP
  

      
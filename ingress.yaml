apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: studio-ingress
  namespace: studio-ns
  annotations:
    haproxy-ingress.github.io/rewrite-target: /
spec:
  ingressClassName: haproxy
  rules:
  - host: studio.local  
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: studio-service
            port:
              number: 3004 # Matches your Service's port